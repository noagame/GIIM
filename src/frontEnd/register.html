<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - GIIM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Registrar Usuario</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" required placeholder="Ej: Juan">
            </div>
            <div class="form-group">
                <label for="lastname">Apellido</label>
                <input type="text" id="lastname" required placeholder="Ej: Pérez">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="juan@clinica.com">
            </div>
            <div class="form-group">
                <label for="role">Rol en el Sistema</label>
                <input type="text" id="role" required placeholder="Ej: medico, admin, farmaceutico">
            </div>
            <div class="form-group">
                <label for="password">Contraseña Temporal</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Crear Cuenta</button>
        </form>
        <div class="auth-links">
            <p>¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>
        </div>
    </div>
</body>
</html>
